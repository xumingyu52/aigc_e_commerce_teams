<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="客户洞察与精准营销 - 智创电商">
    <title>客户洞察与精准营销</title>

    <!-- CSS 文件 -->
    <link href="{{ url_for('static', filename='css/root.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/index.css') }}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Montserrat&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #3a7bd5;
            --secondary-color: #00d2ff;
            --dark-color: #121b2a;
        }
        
        /* 自定义面板样式 */
        .analysis-panel {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(58, 123, 213, 0.2);
            border-radius: 8px;
            padding: 20px;
            height: 100%;
            margin-bottom: 20px;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .tag-badge {
            background: rgba(58, 123, 213, 0.2);
            border: 1px solid var(--primary-color);
            color: #fff;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9em;
        }

        .loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 8px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    
    <!-- START SIDEBAR -->
    <div class="sidebar clearfix">
        <ul class="sidebar-panel nav">
            <li><a href="/home"><span class="icon color5"><i class="fa fa-home"></i></span>首页</a></li>
            <li><a href="#"><span class="icon color10"><i class="fa fa-th"></i></span>商品信息管理<span class="caret"></span></a>
                <ul style="display: block;">
                    <li><a href="/product_management">商品基础信息库</a></li>
                    <li><a href="/product_marketing">商品营销素材库</a></li>
                </ul>
            </li>
            <li><a href="test1"><span class="icon color5"><i class="fa fa-comment-o"></i></span>文案智造器</a></li>
            <li><a href="test2"><span class="icon color11"><i class="fa fa-photo"></i></span>营销图创作</a></li>
            <li><a href="customer_analysis" class="active"><span class="icon color6"><i class="fa fa-users"></i></span>客户洞察与精准营销<span class="label label-danger">NEW</span></a></li>
            <li><a href="test3"><span class="icon color8"><i class="fa fa-film"></i></span>短视频智造</a></li>
            <li><a href="http://127.0.0.1:5000/setting"><span class="icon color12"><i class="fa fa-smile-o"></i></span>数字直播大厅</a></li>
            <li><a href="calendar"><span class="icon color8"><i class="fa fa-calendar-o"></i></span>营销日程规划</a></li>
            <li><a href="note"><span class="icon color8"><i class="fa fa-bullhorn"></i></span>营销笔记发布</a></li>
        </ul>
    </div>
    <!-- END SIDEBAR -->

    <!-- START CONTENT -->
    <div class="content">
        <!-- Start Page Header -->
        <div class="page-header">
            <h1 class="title">客户洞察与精准营销</h1>
            <ol class="breadcrumb">
                <li><a href="/home">首页</a></li>
                <li class="active">客户洞察</li>
            </ol>
        </div>

        <div class="container-padding">
            <div class="row">
                <!-- 左侧：输入区 -->
                <div class="col-md-5">
                    <div class="analysis-panel" style="position: relative;">
                        <div class="loading-overlay" id="inputLoading">
                            <div class="spinner"></div>
                            <p style="color: white; margin-top: 10px;">AI 正在分析客户画像...</p>
                        </div>

                        <h3><i class="fa fa-database"></i> 数据输入</h3>
                        <hr style="border-color: rgba(255,255,255,0.1);">
                        
                        <form id="analysisForm">
                            <div class="form-group">
                                <label class="form-label">1. 目标商品/服务</label>
                                <input type="text" class="form-control" id="productName" placeholder="例如：高端抗皱面霜" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">2. 客户数据源 (支持自然语言)</label>
                                <textarea class="form-control" id="customerData" rows="8" placeholder="在此粘贴客户的聊天记录、评论内容、或者直接描述客户特征。
例如：
'客户是一位30岁左右的宝妈，经常询问产品的安全性，对价格比较敏感，之前买过我们的试用装，觉得效果不错但嫌正装贵。'" required></textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label">3. 营销目标</label>
                                <select class="form-control" id="marketingGoal">
                                    <option value="conversion">直接转化 (逼单)</option>
                                    <option value="trust">建立信任 (种草)</option>
                                    <option value="recall">老客召回</option>
                                    <option value="service">服务关怀</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-default btn-block" style="margin-top: 20px;">
                                <i class="fa fa-rocket"></i> 开始 AI 深度分析
                            </button>
                        </form>
                    </div>
                </div>

                <!-- 右侧：结果区 -->
                <div class="col-md-7">
                    <!-- 结果 1：客户画像分析 -->
                    <div class="analysis-panel">
                        <h3><i class="fa fa-user-secret"></i> 客户画像深度解析</h3>
                        <hr style="border-color: rgba(255,255,255,0.1);">
                        <div id="personaResult" style="min-height: 100px; color: #ccc;">
                            <p class="text-center" style="padding-top: 30px;">等待分析...</p>
                        </div>
                    </div>

                    <!-- 结果 2：精准营销文案 -->
                    <div class="analysis-panel">
                        <h3><i class="fa fa-magic"></i> "千人千面" 营销话术</h3>
                        <hr style="border-color: rgba(255,255,255,0.1);">
                        <div id="copyResult" style="min-height: 150px; color: #ccc;">
                            <p class="text-center" style="padding-top: 50px;">等待生成...</p>
                        </div>
                        <div style="text-align: right; margin-top: 10px; display: none;" id="copyActions">
                            <button class="btn btn-xs btn-default" onclick="copyToClipboard()"><i class="fa fa-copy"></i> 复制文案</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/plugins.js') }}"></script>
    
    <script>
        document.getElementById('analysisForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const productName = document.getElementById('productName').value;
            const customerData = document.getElementById('customerData').value;
            const marketingGoal = document.getElementById('marketingGoal').value;
            
            // 显示 Loading
            document.getElementById('inputLoading').style.display = 'flex';
            document.getElementById('personaResult').innerHTML = '<p class="text-center">正在构建画像...</p>';
            document.getElementById('copyResult').innerHTML = '<p class="text-center">正在生成话术...</p>';

            try {
                const response = await fetch('/api/analyze_customer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        product_name: productName,
                        customer_data: customerData,
                        marketing_goal: marketingGoal
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    renderPersona(data.analysis);
                    renderCopy(data.copy);
                } else {
                    alert('分析失败: ' + data.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('系统错误，请重试');
            } finally {
                document.getElementById('inputLoading').style.display = 'none';
            }
        });

        function renderPersona(analysis) {
            // 解析 markdown 或 纯文本
            const html = marked.parse(analysis);
            document.getElementById('personaResult').innerHTML = html;
        }

        function renderCopy(copy) {
            const html = marked.parse(copy);
            document.getElementById('copyResult').innerHTML = html;
            document.getElementById('copyActions').style.display = 'block';
        }

        function copyToClipboard() {
            const text = document.getElementById('copyResult').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            });
        }
    </script>
</body>
</html>
