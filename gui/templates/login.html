<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Kode is a Premium Bootstrap Admin Template, It's responsive, clean coded and mobile friendly">
  <meta name="keywords" content="bootstrap, admin, dashboard, flat admin template, responsive," />
  <title>登录</title>

  <!-- ========== Css Files ========== -->
  <link href="{{ url_for('static', filename='css/root.css') }}" rel="stylesheet">
  <style type="text/css">
    body{background: #F5F5F5;}
  </style>
  </head>
  <body>

    <div class="login-form">
      <form id="loginForm">
        <div class="top">
          <img src="{{ url_for('static', filename='images/zxhy.jpg') }}" alt="icon" class="icon">
          <h1>智创电商营销系统</h1>
          <h4>智行合一团队</h4>
        </div>
        <div class="form-area">
          <div class="group">
            <input type="text" id="username" class="form-control" placeholder="Username">
            <i class="fa fa-user"></i>
          </div>
          <div class="group">
            <input type="password" id="password" class="form-control" placeholder="Password">
            <i class="fa fa-key"></i>
          </div>
          <div class="checkbox checkbox-primary">
            <input id="checkbox101" type="checkbox" checked>
            <label for="checkbox101"> Remember Me</label>
          </div>
          <button type="submit" class="btn btn-default btn-block">LOGIN</button>
          <div id="login-status" style="margin-top: 10px; text-align: center; color: red;"></div>
        </div>
      </form>
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const loginForm = document.getElementById('loginForm');
      const statusDiv = document.getElementById('login-status');
      
      if (loginForm) {
        loginForm.addEventListener('submit', async function(event) {
          event.preventDefault();
          statusDiv.textContent = 'Logging in...';
          statusDiv.style.color = '#666';
          
          const usernameInput = document.getElementById('username');
          const passwordInput = document.getElementById('password');
          
          if (!usernameInput || !passwordInput) {
            statusDiv.textContent = 'Error: Inputs not found';
            return;
          }
          
          const username = usernameInput.value;
          const password = passwordInput.value;
          
          try {
            const response = await fetch('/api/login', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                email: username,
                password: password
              })
            });
            
            const data = await response.json();
            
            if (response.ok && data.status === 'success') {
              statusDiv.textContent = 'Success! Redirecting...';
              statusDiv.style.color = 'green';
              // Redirect to the main app on port 5000, preserving the current hostname (localhost or IP)
              const targetHost = window.location.hostname;
              window.location.href = `http://${targetHost}:5000/home`;
            } else {
              statusDiv.textContent = data.message || 'Login failed';
              statusDiv.style.color = 'red';
            }
          } catch (error) {
            console.error('Login error:', error);
            statusDiv.textContent = 'Network Error: ' + error.message;
            statusDiv.style.color = 'red';
          }
        });
      }
    });
  </script>
</body>
</html>
