    .panel-border-animated {
        background: linear-gradient(135deg,  #37a1ff 0%, #1b5787 100%);
        border: 1px solid #4d8cff;
        box-shadow: 0 0 15px rgba(77, 140, 255, 0.5);
        border-radius: 5px;
        color: white;
        margin-bottom: 20px;
    }
    .panel-border-animated .panel-title {
        padding: 12px 15px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        font-size: 16px;
        color: #fff;
        background: rgba(0,0,0,0.2);
    }
    .panel-border-animated .panel-body {
        padding: 15px;
        background: rgba(0,0,0,0.1);
    }
    .progress-bar {
        background-color: #4d8cff;
        transition: width 0.6s ease;
    }
    .btn-primary {
        background-color: #4d8cff;
        border-color: #3a7cff;
    }
    #product-category, #product-select {
        background: rgba(15, 23, 42, 0.7);
        color: #e2e8f0;
        border: 1px solid rgba(94, 234, 212, 0.3);
    }
    #image-preview {
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid #444;
        transition: all 0.3s;
    }
    /* 修复 Bootstrap select 样式 */
    #product-select {
        -webkit-appearance: menulist !important;
        appearance: menulist !important;
        opacity: 1 !important;
        display: block !important;
    }
    /* 隐藏可能冲突的第三方样式 */
    .select2-container { display: none !important; }
    </style>
</head>

</div>

<div class="sidebar clearfix">
    <ul class="sidebar-panel nav">
        <li><a href="http://localhost:5000/home"><span class="icon color5"><i class="fa fa-home"></i></span>首页</a></li>
        <li><a href="#"><span class="icon color10"><i class="fa fa-th"></i></span>商品信息管理<span class="caret"></span></a>
            <ul>
                <li><a href="http://localhost:5000/product_management">商品基础信息库</a></li>
                <li><a href="http://localhost:5000/product_marketing">商品营销素材库</a></li>
            </ul>
        </li>
        <li><a href="http://localhost:5000/test1"><span class="icon color5"><i class="fa fa-comment-o"></i></span>文案智造器</a></li>
        <li><a href="http://localhost:5000/test2" class="active"><span class="icon color11"><i class="fa fa-photo"></i></span>营销图创作</a></li>

<div class="content">
    <div class="page-header">
        <h1 class="title">营销图创作</h1>
        <ol class="breadcrumb">
            <li><a href="{{ url_for('home') }}">首页</a></li>
            <li class="active">营销图创作</li>
        </ol>
    </div>

    <div class="container-padding">
        <div class="row">
            <div class="col-md-6">
                <div class="panel panel-border-animated">
                    <div class="panel-title"><i class="fa fa-image"></i> 图像生成预览</div>
                    <div class="panel-body" style="min-height:400px;display:flex;align-items:center;justify-content:center;">
                        <img src="{{ url_for('static', filename='images/智行合一logo.png') }}"
                             alt="生成的图片" id="generated-image"
                             data-error-img="{{ url_for('static', filename='images/image-error.png') }}"
                             style="max-width:100%;max-height:380px;object-fit:contain;">
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="panel panel-border-animated">
                    <div class="panel-title"><i class="fa fa-cogs"></i> 图片生成设定</div>
                    <div class="panel-body">
                        <form id="image-gen-form">
                            <div class="form-group">
                                <label class="form-label">选择商品</label>
                                <div class="input-group">
                                    <select class="form-control" id="product-category"><option value="">选择分类</option></select>
                                    <select class="form-control" id="product-select"><option value="">请先选择分类</option></select>
                                </div>
                                <input type="hidden" id="selected-image-url">
                                <div id="image-preview" class="mt-3 border rounded p-2" style="min-height: 150px; display: flex; justify-content: center; align-items: center;">
                                    <span class="text-muted">预览图将显示在这里</span>
                                </div>
                            </div>
                            <div class="form-group text-right">
                                <button type="submit" class="btn btn-primary" id="submit-btn">
                                    <i class="fa fa-magic"></i> 生成图片
                                </button>
                            </div>
                        </form>
                    </div>
                </div>



                <div class="panel panel-border-animated" id="progress-panel" style="display:none;">
                    <div class="panel-title"><i class="fa fa-spinner fa-spin"></i> 生成进度</div>
                    <div class="panel-body">
                        <div class="progress" style="height:25px;">
                            <div id="gen-progress" class="progress-bar progress-bar-striped active" role="progressbar" style="width:0%;">
                                <span id="progress-text">0%</span>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-md-6"><small>已用时: <span id="time-elapsed">0秒</span></small></div>
                            <div class="col-md-6 text-right"><small>状态: <span id="status-text">初始化...</span></small></div>
                        </div>
                    </div>
                </div>

                <div class="panel panel-border-animated mt-3 d-none" id="upload-confirm-panel"></div>

                <!-- 历史任务面板 -->
                <div class="panel panel-border-animated" style="margin-top: 20px;">
                    <div class="panel-title">
                        <i class="fa fa-history"></i> 生成历史
                    </div>
                    <div class="panel-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>任务ID</th>
                                    <th>状态</th>
                                    <th>时间</th>
                                    <th>结果</th>
                                </tr>
                            </thead>
                            <tbody id="taskHistoryBody">
                                <!-- 历史记录将通过JS插入 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/bootstrap/bootstrap.min.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/plugins.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

<script>
const ossMeta = document.querySelector('meta[name="oss-custom-domain"]');
const OSS_CONFIG = {
    CUSTOM_DOMAIN: (ossMeta && ossMeta.content) || (window.OSS_CUSTOM_DOMAIN || "")
};

$(document).ready(function() {
    loadCategories();
    $('#generated-image').on('error', function(){ this.onerror=null; this.src=$(this).data('error-img'); });

    // 级联选择逻辑
    $('#product-category').change(function() {
        const category = $(this).val();
        if (category) {
            loadProductsByCategory(category);
        } else {
            $('#product-select').empty().append('<option value="">请选择分类</option>');
            $('#image-preview').html('<span class="text-muted">请先选择商品分类</span>');
        }
    });

    $('#product-select').change(updateImagePreview);
    
    // 加载历史记录
    loadTaskHistory();
    // 自动轮询
    setInterval(loadTaskHistory, 5000);

    // 核心生成逻辑
    $('#image-gen-form').submit(async function(e) {
        e.preventDefault();

        // UI重置
        $('#submit-btn').prop('disabled', true);
        $('#progress-panel').show();
        $('#gen-progress').css('width', '0%').removeClass('bg-danger').removeClass('bg-success');
        $('#progress-text').text('0%');
        $('#upload-confirm-panel').addClass('d-none');
        $('#status-text').text('任务提交中...');

        const imageUrl = $('#selected-image-url').val();

        if (!imageUrl) {
            alert('请先选择商品图片');
            $('#submit-btn').prop('disabled', false);
            $('#progress-panel').hide();
            return;
        }

        try {
            // 1. 提交任务
            const genResponse = await $.ajax({
                url: '/api/generate_img2img', 
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ image_url: imageUrl }),
                timeout: 30000
            });

            if (genResponse.code !== 0) throw new Error(genResponse.msg || '任务提交失败');

            const taskId = genResponse.data.task_id;
            
            $('#status-text').text('任务已提交，后台生成中...');
            
            // 立即刷新历史
            loadTaskHistory();
            
            // 开始轮询状态
            pollTaskStatus(taskId);

        } catch (error) {
            console.error('Error:', error);
            $('#gen-progress').css('width', '100%').addClass('bg-danger');
            $('#progress-text').text('失败');
            $('#status-text').text('错误: ' + (error.message || '未知错误'));
            alert('错误: ' + (error.message || '未知错误'));
            $('#submit-btn').prop('disabled', false);
        }
    });
});

function pollTaskStatus(taskId) {
    const startTime = Date.now();
    const pollInterval = setInterval(() => {
        $.get(`/api/check_task_status/${taskId}`)
        .done(function(response) {
            if (response.status === 'success') {
                const task = response.task;
                
                // 更新时间
                $('#time-elapsed').text(Math.floor((Date.now() - startTime) / 1000) + '秒');
                
                if (task.status === 'completed') {
                    clearInterval(pollInterval);
                    $('#gen-progress').css('width', '100%').addClass('bg-success');
                    $('#progress-text').text('100%');
                    $('#status-text').text('生成完成');
                    
                    const result = task.result; // 已解析
                    if (result && result.image_url) {
                         const finalUrl = result.image_url;
                         $('#generated-image').attr('src', finalUrl);
                         $('#submit-btn').prop('disabled', false);
                         
                         handleImageGenerationSuccess({
                            status: 'success',
                            image_url: finalUrl
                        });
                        
                        alert('图片生成成功！');
                    }
                    
                } else if (task.status === 'failed') {
                    clearInterval(pollInterval);
                    $('#gen-progress').css('width', '100%').addClass('bg-danger');
                    $('#status-text').text('任务失败: ' + task.error);
                    $('#submit-btn').prop('disabled', false);
                } else {
                    // processing
                    $('#status-text').text('生成中...');
                    // 模拟进度
                    let currentWidth = parseFloat($('#gen-progress')[0].style.width) || 10;
                    if (currentWidth < 90) {
                        $('#gen-progress').css('width', (currentWidth + 5) + '%');
                        $('#progress-text').text(Math.floor(currentWidth + 5) + '%');
                    }
                }
            }
        });
    }, 2000);
}

// 加载任务历史
function loadTaskHistory() {
    $.get('/api/tasks/image')
    .done(function(response) {
        if (response.status === 'success') {
            const $tbody = $('#taskHistoryBody');
            $tbody.empty();
            
            if (response.tasks.length === 0) {
                $tbody.html('<tr><td colspan="4" class="text-center text-muted">暂无历史记录</td></tr>');
                return;
            }
            
            response.tasks.forEach(task => {
                let statusBadge = '';
                let action = '';
                
                if (task.status === 'completed') {
                    statusBadge = '<span class="label label-success">完成</span>';
                    try {
                        const result = JSON.parse(task.result);
                        if (result.image_url) {
                            action = `<a href="${result.image_url}" target="_blank" class="btn btn-xs btn-info"><i class="fa fa-eye"></i> 查看</a> 
                                      <button onclick="$('#generated-image').attr('src', '${result.image_url}')" class="btn btn-xs btn-primary"><i class="fa fa-arrow-up"></i> 预览</button>`;
                        }
                    } catch(e) {}
                } else if (task.status === 'processing') {
                    statusBadge = '<span class="label label-warning">生成中...</span>';
                } else if (task.status === 'failed') {
                    statusBadge = '<span class="label label-danger">失败</span>';
                    action = `<span class="text-danger" title="${task.error}">${task.error}</span>`;
                } else {
                    statusBadge = '<span class="label label-default">等待中</span>';
                }
                
                $tbody.append(`
                    <tr>
                        <td>${task.id.substring(0, 8)}...</td>
                        <td>${statusBadge}</td>
                        <td>${new Date(task.created_at).toLocaleString()}</td>
                        <td>${action}</td>
                    </tr>
                `);
            });
        }
    });
}

// 处理生成成功逻辑
function handleImageGenerationSuccess(response) {
    if (response.status === 'success' && response.image_url) {
        const rawUrl = response.image_url;

        $('#upload-confirm-panel').removeClass('d-none').html(`
            <div class="panel-title"><i class="fa fa-cloud-upload"></i> 后续操作</div>
            <div class="panel-body">
                <div class="alert alert-success">
                    <strong>图片已生成！</strong>
                    <p class="mt-2">您可以选择将其上传到营销素材库，或直接下载。</p>
                    <div class="d-flex justify-content-between mt-3">
                        <button id="confirm-upload" class="btn btn-success"><i class="fa fa-upload"></i> 上传到素材库</button>
                        <a href="${rawUrl}" target="_blank" class="btn btn-info"><i class="fa fa-download"></i> 查看原图</a>
                    </div>
                </div>
            </div>
        `);

        // 绑定上传事件
        $('#confirm-upload').off('click').on('click', function() {
            uploadToOSS(rawUrl);
        });
    }
}

// 加载分类
function loadCategories() {
    $.get('/api/oss/categories')
     .done(function(res) {
        if(res.code === 200 || res.status === 'success') {
            const list = res.data || [];
            if (list.length === 0) {
                $('#product-category').html('<option value="">暂无分类</option>');
                $('#image-preview').html('<span class="text-muted">分类为空，请稍后重试</span>');
                return;
            }
            list.forEach(c => $('#product-category').append(`<option value="${c}">${c}</option>`));
        } else {
            $('#product-category').html('<option value="">分类加载失败</option>');
            $('#image-preview').html('<span class="text-muted">分类接口异常</span>');
        }
     })
     .fail(function() {
        $('#product-category').html('<option value="">分类不可用</option>');
        $('#image-preview').html('<span class="text-muted">OSS暂不可用，请稍后重试</span>');
     });
}

// 加载商品
function loadProductsByCategory(cat) {
    $('#product-select').empty().append('<option>加载中...</option>');
    $.get('/api/oss/products_by_category', { category: cat })
     .done(function(res) {
        $('#product-select').empty().append('<option value="">-- 选择商品 --</option>');
        if(res.status === 'success' && res.data) {
            if (res.data.length === 0) {
                $('#product-select').append('<option value="">该分类暂无商品</option>');
                $('#image-preview').html('<span class="text-muted">无商品主图</span>');
                return;
            }
            res.data.forEach(p => {
                const opt = $('<option>').val(p.product_id).text(p.name);
                const d = OSS_CONFIG.CUSTOM_DOMAIN;
                opt.data('img', (p.main_image && d) ? `https://${d}/${p.main_image}` : '');
                $('#product-select').append(opt);
            });
        } else {
            $('#product-select').html('<option value="">商品加载失败</option>');
            $('#image-preview').html('<span class="text-muted">商品接口异常</span>');
        }
     })
     .fail(function() {
        $('#product-select').html('<option value="">加载失败</option>');
        $('#image-preview').html('<span class="text-muted">OSS暂不可用，请稍后重试</span>');
     });
}

// 更新预览
function updateImagePreview() {
    const img = $('#product-select option:selected').data('img');
    $('#image-preview').empty();
    if(img) {
        $('#image-preview').html(`<img src="${img}" class="img-fluid" style="max-height:150px;">`);
        $('#selected-image-url').val(img);
    } else {
        $('#image-preview').html('<span class="text-muted">该商品无主图</span>');
        $('#selected-image-url').val('');
    }
}

// 上传逻辑
function uploadToOSS(url) {
    const pid = $('#product-select').val();
    if(!pid) return alert('请先选择归属商品');

    $('#upload-confirm-panel .panel-body').html('<div class="alert alert-warning">正在上传...</div>');

    $.ajax({
        url: '/api/save_generated_content',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
            product_id: pid,
            type: 'image',
            file_url: url,
            metadata: { generated_at: new Date().toISOString() }
        }),
        success: function(res) {
            if(res.status === 'success') {
                $('#upload-confirm-panel .panel-body').html('<div class="alert alert-success">上传成功！</div>');
            } else {
                alert('上传失败: ' + res.error);
            }
        }
    });
}


</script>
